<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Desconto</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* Ajustes extras do modal */
    .modal {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 80%;
      background: #111;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
      animation: slideUp 0.3s ease;
      z-index: 999;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal h2 {
      margin-top: 10px;
      color: #d4af37;
    }

    .modal p {
      margin: 5px 0;
      color: #ccc;
    }

    .modal img {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
      object-fit: cover;
    }

    .closeBtn {
      font-size: 22px;
      color: #d4af37;
      cursor: pointer;
    }

    .rotaBtn {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: linear-gradient(90deg,#d4af37,#b8860b);
      border: none;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      color: #111;
      font-size: 16px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Meu Desconto</h1>
    <input type="text" id="searchInput" placeholder="Buscar loja..." onkeyup="searchLojas()">
  </header>

  <!-- CATEGORIAS -->
  <div class="categories">
    <button class="active" onclick="filterCategory('all')">Todos</button>
    <button onclick="filterCategory('farmacia')">Farmácia</button>
    <button onclick="filterCategory('mercado')">Mercado</button>
    <button onclick="filterCategory('restaurante')">Restaurante</button>
    <button onclick="filterCategory('academia')">Academia</button>
    <button onclick="filterCategory('salao')">Salão</button>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- LISTA DE EMPRESAS -->
  <div id="lojasContainer"></div>

  <!-- MODAL DETALHES -->
  <div id="lojaModal" class="modal">
    <span class="closeBtn" onclick="closeModal()">← Voltar</span>

    <h2 id="modalNome"></h2>
    <p id="modalDesconto"></p>
    <p id="modalCondicoes"></p>

    <img id="modalImagem" src="">

    <button id="rotaBtn" class="rotaBtn">
      📍 Como chegar
    </button>
  </div>

  <!-- SCRIPT PRINCIPAL -->
  <script src="script.js"></script>

  <!-- GOOGLE MAPS -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3aC2c04istc1__3ER-XZr5dOLpaezVQQ&callback=initMap">
  </script>

</body>
</html>
