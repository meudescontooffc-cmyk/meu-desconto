<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Desconto</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Meu Desconto</h1>
  <input type="text" id="searchInput" placeholder="Buscar loja..." onkeyup="searchLojas()">
</header>

<div class="categories">
  <button class="active" onclick="filterCategory('all')">Todos</button>
  <button onclick="filterCategory('farmacia')">Farmácia</button>
  <button onclick="filterCategory('mercado')">Mercado</button>
  <button onclick="filterCategory('restaurante')">Restaurante</button>
  <button onclick="filterCategory('academia')">Academia</button>
  <button onclick="filterCategory('salao')">Salão</button>
</div>

<div id="map"></div>

<div id="lojasContainer"></div>

<div id="lojaModal" class="modal">
  <span class="closeBtn" onclick="closeModal()">← Voltar</span>
  <h2 id="modalNome"></h2>
  <p id="modalDesconto"></p>
  <p id="modalCondicoes"></p>
  <img id="modalImagem" src="">
  <button id="rotaBtn" class="rotaBtn">📍 Como chegar</button>
  <button onclick="cancelarRota()" class="cancelBtn">❌ Cancelar rota</button>
</div>

<script src="script.js"></script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3aC2c04istc1__3ER-XZr5dOLpaezVQQ&callback=initMap">
</script>

</body>
</html>
